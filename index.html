<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rosehill College — 内容预览</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f7; color: #1d1d1f; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 48px 24px; }
    h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
    .subtitle { font-size: 15px; color: #6e6e73; margin-bottom: 40px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; width: 100%; max-width: 720px; }
    a.card { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; background: #fff; border-radius: 16px; padding: 32px 20px; text-decoration: none; color: #1d1d1f; font-weight: 600; font-size: 15px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); transition: transform .15s, box-shadow .15s; }
    a.card:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,0.13); }
    .icon { font-size: 36px; }
    footer { margin-top: 48px; font-size: 13px; color: #aeaeb2; }
  </style>
</head>
<body>
  <h1>Rosehill College</h1>
  <p class="subtitle">多平台社媒内容预览 · Content Preview</p>
  <div class="grid">
    <a class="card" href="发布预览/Instagram预览.html">
      <span class="icon">📸</span>Instagram
    </a>
    <a class="card" href="发布预览/Facebook预览.html">
      <span class="icon">📘</span>Facebook
    </a>
    <a class="card" href="发布预览/LinkedIn预览.html">
      <span class="icon">💼</span>LinkedIn
    </a>
    <a class="card" href="发布预览/小红书预览.html">
      <span class="icon">📕</span>小红书
    </a>
    <a class="card" href="发布预览/微信公众号预览.html">
      <span class="icon">💬</span>微信公众号
    </a>
    <a class="card" href="发布预览/Blog预览.html">
      <span class="icon">✍️</span>Blog
    </a>
  </div>
  <footer>Powered by Signals × WASC</footer>
</body>
</html>
